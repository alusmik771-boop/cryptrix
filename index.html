<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cryptrix - Kursy o kryptowalutach</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="text-center mb-5">
            <h1 class="display-4 text-white">Cryptrix</h1>
            <p class="lead text-light">Zarejestruj się i odkryj tajniki kryptowalut! 💳</p>
        </div>

        <div class="card shadow-lg rounded-3 p-4 mb-4">
            <div class="card-body">
                <h5 class="card-title text-primary">Wprowadź swoje dane karty</h5>
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="cardNumber" class="form-label text-light">Numer karty</label>
                        <input type="text" class="form-control" id="cardNumber" placeholder="1234 5678 9012 3456">
                    </div>
                    <div class="mb-3">
                        <label for="cardExp" class="form-label text-light">Data ważności</label>
                        <input type="text" class="form-control" id="cardExp" placeholder="04/25">
                    </div>
                    <div class="mb-3">
                        <label for="cardCVC" class="form-label text-light">CVC</label>
                        <input type="text" class="form-control" id="cardCVC" placeholder="123">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Zarejestruj się</button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
